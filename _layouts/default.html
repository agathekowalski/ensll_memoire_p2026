<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <!-- Lien vers ton CSS à la racine -->
    <link rel="stylesheet" href="{{ "/style.css" | relative_url }}">
    <style>
  /* Style pour la coloration syntaxique avec Rouge */
  .highlight {
    background-color: #f6f8fa;
    border-radius: 3px;
    padding: 1rem;
    overflow-x: auto;
    margin: 1rem 0;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  /* Thème "github" pour Rouge (similaire à GitHub) */
  .highlight .k { color: #d73a49; } /* Mots-clés */
  .highlight .s { color: #032f62; } /* Chaînes de caractères */
  .highlight .c { color: #6a737d; font-style: italic; } /* Commentaires */
  .highlight .n { color: #005cc5; } /* Noms de variables, fonctions, etc. */
  .highlight .o { color: #22863a; } /* Opérateurs */
  .highlight .p { color: #005cc5; } /* Ponctuation */
  .highlight .mi { color: #005cc5; } /* Nombres */
  .highlight .mf { color: #005cc5; } /* Nombres à virgule */
  .highlight .mh { color: #005cc5; } /* Nombres hexadécimaux */
  .highlight .ge { color: #6a737d; font-style: italic; } /* Mots-clés génériques */
  .highlight .gs { color: #005cc5; font-weight: bold; } /* Chaînes génériques */
  .highlight .gu { color: #005cc5; } /* URL */
  .highlight .gt { color: #005cc5; } /* Types génériques */
  .highlight .kc { color: #d73a49; } /* Constantes */
  .highlight .kd { color: #d73a49; } /* Mots-clés de déclaration */
  .highlight .kn { color: #d73a49; font-weight: bold; } /* Mots-clés de namespace */
  .highlight .kp { color: #d73a49; } /* Mots-clés pseudo */
  .highlight .kr { color: #d73a49; font-weight: bold; } /* Mots-clés de retour */
  .highlight .kt { color: #445588; } /* Types */
  .highlight .ld { color: #005cc5; } /* Littéraux de date */
  .highlight .l { background-color: #f1f8ff; color: #005cc5; } /* Littéraux */
  .highlight .na { color: #008080; } /* Attributs */
  .highlight .nb { color: #005cc5; } /* Noms de builtins */
  .highlight .nc { color: #445588; } /* Classes */
  .highlight .no { color: #005cc5; } /* Constantes numériques */
  .highlight .nd { color: #005cc5; } /* Noms de décorateurs */
  .highlight .ne { color: #d73a49; font-weight: bold; } /* Noms d'exceptions */
  .highlight .nf { color: #005cc5; } /* Noms de fonctions */
  .highlight .nl { color: #005cc5; } /* Littéraux */
  .highlight .nn { color: #005cc5; } /* Noms de variables */
  .highlight .nx { color: #005cc5; } /* Noms de variables spéciales */
  .highlight .py { color: #005cc5; } /* Noms de types Python */
  .highlight .nt { color: #005cc5; } /* Noms de tags */
  .highlight .nv { color: #005cc5; } /* Noms de variables */
  .highlight .ow { color: #d73a49; font-weight: bold; } /* Opérateurs de mots */
  .highlight .w { color: #bbbbbb; } /* Espaces blancs */
  .highlight .mf { color: #005cc5; } /* Nombres à virgule flottante */
  .highlight .mh { color: #005cc5; } /* Nombres hexadécimaux */
  .highlight .mi { color: #005cc5; } /* Nombres entiers */
  .highlight .mo { color: #005cc5; } /* Opérateurs mathématiques */
  .highlight .sa { color: #032f62; } /* Chaînes de caractères avec apostrophes */
  .highlight .sb { color: #032f62; } /* Chaînes de caractères avec backticks */
  .highlight .sc { color: #032f62; } /* Chaînes de caractères avec guillemets */
  .highlight .dl { color: #032f62; } /* Littéraux de délimiteurs */
  .highlight .sd { color: #032f62; } /* Docstrings */
  .highlight .s2 { color: #032f62; } /* Chaînes de caractères doubles */
  .highlight .se { color: #032f62; } /* Échappements */
  .highlight .sh { color: #032f62; } /* Chaînes de caractères avec hachage */
  .highlight .si { color: #032f62; } /* Chaînes de caractères avec interpolation */
  .highlight .sx { color: #032f62; } /* Chaînes de caractères spéciales */
  .highlight .sr { color: #032f62; } /* Chaînes de caractères brutes */
  .highlight .s1 { color: #032f62; } /* Chaînes de caractères simples */
  .highlight .ss { color: #032f62; } /* Chaînes de caractères symboliques */
  .highlight .bp { color: #005cc5; } /* Noms de propriétés builtins */
  .highlight .fm { color: #005cc5; } /* Noms de fonctions magiques */
  .highlight .vc { color: #005cc5; } /* Noms de variables de classe */
  .highlight .vg { color: #005cc5; } /* Noms de variables globales */
  .highlight .vi { color: #005cc5; } /* Noms de variables d'instance */
  .highlight .vm { color: #005cc5; } /* Noms de variables magiques */
</style>
    <!-- Police Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      {% include header.html %}
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <p>2026 - Agathe Kowalski - Annexes de mémoire</p>
    </footer>
  </body>
</html>
