<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <!-- Lien vers ton CSS à la racine -->
    <link rel="stylesheet" href="{{ "/style.css" | relative_url }}">
   <style>
  /* Thème sombre et coloré pour les blocs de code (inspiré de Dracula/Monokai) */
  .highlight {
    background-color: #282a36;
    border-radius: 5px;
    padding: 0.5rem;
    overflow-x: auto;  /* Active le défilement horizontal si nécessaire */
    margin: 0;
    font-size: 0.9rem;
    line-height: 1.5;
    color: #f8f8f2;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 100px;  /* Définit une largeur maximale */
  }

  /* Numéros de ligne */
  .highlight .lineno {
    color: #6272a4;
    padding-right: 0.5rem;
    user-select: none;
    border-right: 1px solid #44475a;
    margin-right: 0.5rem;
  }

  /* Le reste de ton CSS pour la coloration syntaxique reste inchangé */
  .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr {
    color: #ff79c6;
    font-weight: bold;
  }
  .highlight .s, .highlight .sa, .highlight .sb, .highlight .sc, .highlight .dl, .highlight .sd, .highlight .s2, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr {
    color: #f1fa8c; /* Jaune pour les chaînes de caractères */
  }
  .highlight .c, .highlight .cm, .highlight .c1, .highlight .cs {
    color: #6272a4; /* Gris bleuâtre pour les commentaires */
    font-style: italic;
  }
  .highlight .n, .highlight .na, .highlight .nb, .highlight .nc, .highlight .no, .highlight .nd, .highlight .ni, .highlight .ne, .highlight .nf, .highlight .nl, .highlight .nn, .highlight .nx, .highlight .py, .highlight .nt, .highlight .nv {
    color: #8be9fd; /* Bleu clair pour les noms (variables, fonctions, etc.) */
  }
  .highlight .o, .highlight .ow {
    color: #ffb86c; /* Orange pour les opérateurs */
    font-weight: bold;
  }
  .highlight .p {
    color: #f8f8f2; /* Blanc pour la ponctuation */
  }
  .highlight .mi, .highlight .mf, .highlight .mh, .highlight .il, .highlight .m, .highlight .mo {
    color: #bd93f9; /* Violet pour les nombres */
  }
  .highlight .ge, .highlight .gh, .highlight .go, .highlight .gp, .highlight .gs, .highlight .gu, .highlight .gt {
    color: #ffb86c; /* Orange pour les éléments génériques */
  }
  .highlight .kc, .highlight .kt {
    color: #ff79c6; /* Rose pour les constantes et types */
  }
  .highlight .ld {
    color: #8be9fd; /* Bleu clair pour les littéraux de date */
  }
  .highlight .l {
    color: #f1fa8c; /* Jaune pour les littéraux */
  }
  .highlight .w {
    color: #f8f8f2; /* Blanc pour les espaces */
  }
</style>
    <!-- Police Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      {% include header.html %}
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <p>2026 - Agathe Kowalski - Annexes de mémoire</p>
    </footer>
  </body>
</html>
